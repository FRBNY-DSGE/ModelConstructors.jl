name: 'build'
on: [push, pull_request]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Migrated to Julia 1.12 (modern Distributions/DataFrames stack). Older
        # Julias (1.1/1.5) no longer pass: the compat bounds were bumped past what
        # they can resolve.
        julia-version: ['1.12']
        julia-arch: [x64]
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
      - name: "Set up Julia"
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
          arch: ${{ matrix.julia-arch }}
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
        # NOTE: codecov-action@v4+ may require CODECOV_TOKEN as a repo secret for
        # uploads (even on public repos). Add it under Settings -> Secrets if uploads 401.
